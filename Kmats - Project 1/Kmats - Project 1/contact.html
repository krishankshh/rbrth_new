<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | RBRTH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .contact-page { display: grid; grid-template-columns: 1fr 1fr; min-height: 90vh; }
    .contact-info { background: #080808; padding: 100px 48px; display: flex; flex-direction: column; justify-content: center; }
    .contact-form { padding: 100px 48px; display: flex; flex-direction: column; justify-content: center; background: #000; }
    .contact-header { font-family: 'Barlow Condensed', sans-serif; font-size: 64px; font-weight: 900; text-transform: uppercase; margin-bottom: 24px; }
    .contact-sub { font-size: 18px; color: #666; margin-bottom: 48px; max-width: 400px; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; font-size: 12px; letter-spacing: 0.1em; color: #888; margin-bottom: 8px; }
    .form-group input, .form-group textarea { width: 100%; background: #111; border: 1px solid #222; padding: 16px; color: #fff; font-family: inherit; font-size: 16px; transition: border-color 0.3s; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #e8190e; }
    .submit-btn { background: #fff; color: #000; border: none; padding: 20px; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 16px; letter-spacing: 0.1em; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
    .submit-btn:hover { background: #e8190e; color: #fff; }
    .contact-details { margin-top: 48px; }
    .detail-item { margin-bottom: 24px; }
    .detail-item h4 { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; font-size: 14px; color: #e8190e; margin-bottom: 4px; }
    .detail-item p { font-size: 18px; color: #fff; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo" style="position:static; margin:0 auto;"><a href="index.html"><img src="assets/logo.png" alt="RBRTH" /></a></div>
  </nav>

  <div class="contact-page">
    <div class="contact-info">
      <h1 class="contact-header">Get in<br>Touch</h1>
      <p class="contact-sub">Have a question about our science or your order? Our team is here to help you reach your peak.</p>
      
      <div class="contact-details">
        <div class="detail-item">
          <h4>Email</h4>
          <p>support@rbrth.com</p>
        </div>
        <div class="detail-item">
          <h4>Headquarters</h4>
          <p>Harmoniq Labs, New Delhi, India</p>
        </div>
        <div class="detail-item">
          <h4>Hours</h4>
          <p>Mon – Fri: 9am – 6pm IST</p>
        </div>
      </div>
    </div>

    <div class="contact-form">
      <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" placeholder="Order Inquiry">
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea rows="5" placeholder="How can we help?" required></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </div>
  </div>

  <script src="assets/main.js"></script>
</body>
</html>
