<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Soon | RBRTH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    body { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a0000 0%, #000 100%); }
    .password-card { text-align: center; max-width: 500px; padding: 40px; }
    .logo-large { height: 60px; margin-bottom: 40px; }
    .countdown { font-family: 'Barlow Condensed'; font-size: 48px; font-weight: 900; color: var(--primary); margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="password-card">
    <img src="assets/logo.png" class="logo-large" alt="RBRTH">
    <h1 class="countdown">RELOADING...</h1>
    <h2 style="font-family:'Barlow Condensed'; text-transform:uppercase; font-size:24px; margin-bottom:12px;">The next drop is coming</h2>
    <p style="color:var(--text-muted); margin-bottom:40px;">Enter your email to get notified the second we launch.</p>
    
    <div class="fsub-row">
      <input type="email" placeholder="your@email.com" style="background:var(--bg-offset); border:1px solid var(--border); padding:18px; color:#fff; width:100%; margin-bottom:12px;">
      <button class="pc-btn" style="width:100%; padding:18px;">Notify Me</button>
    </div>
    
    <div style="margin-top:40px;">
      <p style="font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.2);">Are you the store owner?</p>
      <a href="login.html" style="color:var(--text); font-size:12px; font-weight:700; text-decoration:none;">Enter with Password</a>
    </div>
  </div>
</body>
</html>
